# Force Python provider - ignore package.json
providers = ["python"]

[phases.setup]
# Keep ALL default Railway/Nixpacks packages + our OCR dependencies
# (the "..." is required — it preserves Python, gcc, etc. that Nixpacks auto-adds)
nixPkgs = ["...", "python311", "gcc", "poppler_utils", "tesseract5"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --timeout-keep-alive 120"

[variables]
PYTHONUNBUFFERED = "1"